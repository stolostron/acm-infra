apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: acm

resources:
  - namespace.yaml
  - rbac.yaml
  - eventbus.yaml
  - eventsource-github.yaml
  - sensor-github.yaml
  - route-github.yaml
  - ../shared/namespace-resources  # Shared namespace-scoped resources (secrets, context, network-policy)

labels:
  - pairs:
      app.kubernetes.io/name: code-agent
      app.kubernetes.io/component: acm
    includeSelectors: false
