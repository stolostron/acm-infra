apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 99-master-gvisor
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        # CRI-O configuration for gVisor runtime (SELinux disabled for gVisor compatibility)
        - path: /etc/crio/crio.conf.d/99-gvisor.conf
          mode: 0644
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,W2NyaW8ucnVudGltZV0Kc2VsaW51eCA9IGZhbHNlCmRyb3BfaW5mcmFfY3RyID0gZmFsc2UKCltjcmlvLnJ1bnRpbWUucnVudGltZXMucnVuc2NdCnJ1bnRpbWVfcGF0aCA9ICIvdXNyL2xvY2FsL2Jpbi9ydW5zYyIKcnVudGltZV90eXBlID0gIm9jaSIKcnVudGltZV9yb290ID0gIi9ydW4vcnVuc2MiCg==
        # gVisor installation script
        - path: /usr/local/bin/install-gvisor.sh
          mode: 0755
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
    systemd:
      units:
        - name: gvisor-install.service
          enabled: true
          contents: |
            [Unit]
            Description=Install gVisor runsc
            Wants=network-online.target
            After=network-online.target
            Before=crio.service
            ConditionPathExists=!/usr/local/bin/runsc

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/install-gvisor.sh
            RemainAfterExit=yes

            [Install]
            WantedBy=multi-user.target
