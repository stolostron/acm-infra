apiVersion: v1
kind: Pod
metadata:
  name: gvisor-simple
  namespace: default
spec:
  runtimeClassName: gvisor
  containers:
  - name: test
    image: busybox:latest
    command: ["sh", "-c", "echo 'Hello from gVisor!' && uname -a && sleep 300"]
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
