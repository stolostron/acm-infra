# Single agent for ACM tasks using "repo as agent" pattern
# Skills are loaded dynamically from the .claude/skills/ directory
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: acm
spec:
  profile: "ACM agent for general ACM maintenance tasks"
  agentImage: quay.io/kubeopencode/kubeopencode-agent-opencode:latest
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  workspaceDir: /workspace
  serviceAccountName: acm-agent
  maxConcurrentTasks: 2
  config: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "google/gemini-3.1-pro-preview",
      "small_model": "google/gemini-3-flash-preview",
      "share": "disabled",
      "autoupdate": false,
      "agent": {
        "general": {
          "model": "google/gemini-3-flash-preview"
        }
      }
    }
  contexts:
    - name: basic-rules
      type: Text
      text: |
        ## Agent Behavior Rules
        1. Always sign-off commits with `--signoff` flag.
        2. Read available skills from the skills/ directory for task-specific workflows.
  credentials:
    # Mount entire secret - all keys become env vars automatically
    - name: git
      secretRef:
        name: git-settings
    - name: gemini
      secretRef:
        name: gemini-credentials
    # GitHub App credentials mounted as directory
    # The devbox image has built-in scripts that automatically use these
    # for transparent gh CLI and git authentication
    - name: github-app
      secretRef:
        name: github-bot-credentials
    # Currently this slack webhook URL points to #acmqe-serverfoundation-auto-notify.
    - name: slack
      secretRef:
        name: slack-webhook-url
